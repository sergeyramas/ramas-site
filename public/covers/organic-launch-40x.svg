<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="bg40" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#28221d"/>
      <stop offset="1" stop-color="#1b1713"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#8a6b56"/>
      <stop offset="0.7" stop-color="#DC7A4F"/>
      <stop offset="1" stop-color="#f0a373"/>
    </linearGradient>
    <filter id="grain40">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.04"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg40)"/>

  <!-- kicker -->
  <text x="80" y="118" font-family="ui-monospace, monospace" font-size="15" letter-spacing="4" fill="#a89e90">CASE · ORGANIC LAUNCH</text>

  <!-- big ×40 -->
  <text x="72" y="300" font-size="200" font-weight="700" fill="#F2EDE3" letter-spacing="-4">×40</text>
  <text x="80" y="352" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="20" fill="#c9beac">трафик за одни сутки</text>

  <!-- flat-then-spike sparkline, bottom-right -->
  <g transform="translate(430,150)">
    <polyline points="0,190 60,189 120,188 180,186 240,182 285,176 330,120 375,52 400,14"
              fill="none" stroke="url(#spark)" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="400" cy="14" r="7" fill="#F2EDE3" stroke="#DC7A4F" stroke-width="4"/>
    <line x1="0" y1="196" x2="400" y2="196" stroke="#3a332c" stroke-width="1.5"/>
    <text x="0" y="220" font-family="ui-monospace, monospace" font-size="13" fill="#8a8073">~15/day</text>
    <text x="400" y="220" font-family="ui-monospace, monospace" font-size="13" fill="#DC7A4F" text-anchor="end">~600/day</text>
  </g>

  <!-- baseline caption -->
  <text x="80" y="430" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="14" fill="#8a8073">Ночь · Волна · Пик — три хода, один взрыв. 68% — органика поиска.</text>

  <rect width="800" height="500" filter="url(#grain40)" opacity="0.5" pointer-events="none"/>
</svg>
